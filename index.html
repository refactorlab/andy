<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Andy — PR Handoff Assistant by Refactor Labs. A GitHub Action that turns every pull request into a guided handoff: architecture, money/time impact, focused suggestions, risk map." />
    <meta name="keywords" content="pull request review, GitHub Action, code review, PR handoff, architecture map, developer tools, Refactor Labs, Andy" />
    <meta name="author" content="Refactor Labs" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://refactorlab.github.io/andy/" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafaf7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f0e0c" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <meta name="apple-mobile-web-app-title" content="Andy" />

    <meta property="og:title" content="Andy — PR Handoff Assistant by Refactor Labs" />
    <meta property="og:description" content="The companion that explains your PR like the engineer who wrote it would." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Andy by Refactor Labs" />
    <meta property="og:url" content="https://refactorlab.github.io/andy/" />
    <meta property="og:image" content="https://refactorlab.github.io/andy/favicon.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Andy — PR Handoff Assistant by Refactor Labs" />
    <meta name="twitter:description" content="The PR review that explains what actually changed: architecture, impact, ranked suggestions, risk map." />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Andy — PR Handoff Assistant",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "GitHub Actions",
        "description": "A GitHub Action that turns every pull request into a guided handoff: an architecture map, a money/time impact card, ranked code suggestions, and a risk quadrant.",
        "url": "https://refactorlab.github.io/andy/",
        "license": "https://github.com/refactorlab/andy/blob/main/LICENSE",
        "author": { "@type": "Organization", "name": "Refactor Labs", "url": "https://github.com/refactorlab" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <!-- FAQPage structured data — mirrors the on-page FAQ verbatim (Faq.tsx) so
         it stays valid + eligible for search Q&A understanding. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Does Andy upload my code anywhere?",
            "acceptedAnswer": { "@type": "Answer", "text": "No. Andy runs entirely inside your GitHub Action runner — public or private. Nothing leaves the workflow." }
          },
          {
            "@type": "Question",
            "name": "What does it cost?",
            "acceptedAnswer": { "@type": "Answer", "text": "The Action is free and MIT-licensed. You pay only your usual GitHub Actions runner minutes (Andy typically finishes in ~30 seconds)." }
          },
          {
            "@type": "Question",
            "name": "Does it work on private repos?",
            "acceptedAnswer": { "@type": "Answer", "text": "Yes. It runs on whatever runner the repo uses — public, private, or self-hosted." }
          },
          {
            "@type": "Question",
            "name": "Will it slow down my pull requests?",
            "acceptedAnswer": { "@type": "Answer", "text": "No. Andy runs in parallel with your other checks and posts within ~30 seconds of a push, overwriting its previous comment." }
          },
          {
            "@type": "Question",
            "name": "How is it different from a Copilot-style review?",
            "acceptedAnswer": { "@type": "Answer", "text": "Andy ships a fixed bundle of artifacts — architecture map, value card, risk quadrant, ranked suggestions — with confidence-scored, applyable diffs and references. Not free-text vibes." }
          }
        ]
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Font CSS is intentionally non-blocking and explicitly low-priority: the
      page renders correctly in fallback fonts and swaps in Inter/JetBrains
      Mono when they arrive. `fetchpriority="low"` lets the browser bias its
      bandwidth budget toward the framework chunk + speculation prerender.
    -->
    <link
      rel="preload"
      as="style"
      fetchpriority="low"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      fetchpriority="low"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap"
      />
    </noscript>
    <title>Andy — PR Handoff Assistant by Refactor Labs</title>
    <!--
      Speculation Rules: prerender the example review in the background so
      clicking "See an example review" swaps to a fully-rendered page in
      <50 ms. We declare it with the moderate `eagerness` knob so the browser
      only commits the work when it has spare cycles. Falls back to prefetch
      on browsers that support that but not prerender; both are no-ops
      everywhere else.
    -->
    <script type="speculationrules">
      {
        "prerender": [
          { "source": "list", "urls": ["./pr36-github-ui_2.html"], "eagerness": "moderate" }
        ],
        "prefetch": [{ "source": "list", "urls": ["./pr36-github-ui_2.html"] }]
      }
    </script>
    <script>
      // Theme bootstrap — runs before paint, no FOUC on reload.
      (function () {
        try {
          var stored = localStorage.getItem('andy-theme');
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>

    <!--
      Background colour set before any CSS arrives so reloads don't flash a
      white frame on dark theme. The full stylesheet is inlined into this
      document by the build (see vite.config.ts inlineMainCss plugin), so
      there is no render-blocking CSS request to wait for.
    -->
    <style>
      html { background: #fafaf7; }
      html[data-theme='dark'] { background: #0f0e0c; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width: 640px; margin: 12vh auto; padding: 28px; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; line-height: 1.6; color: #1a1a1a;">
        <h1 style="font-size: 28px; letter-spacing: -0.02em; margin: 0 0 12px;">Andy — PR Handoff Assistant</h1>
        <p style="color: #555; margin: 0 0 20px;">A GitHub Action that turns every pull request into a guided handoff: architecture map, money/time impact, ranked code suggestions, and a risk quadrant.</p>
        <p style="margin: 0 0 8px;">This landing page is interactive and needs JavaScript. With JS disabled, here's what you need:</p>
        <ul style="margin: 0 0 20px; padding-inline-start: 20px;">
          <li><a href="https://github.com/marketplace/actions/andy-pr-handoff-by-drift">Install Andy from the GitHub Marketplace</a></li>
          <li><a href="https://github.com/refactorlab/andy">View source &amp; docs on GitHub</a></li>
          <li><a href="./pr36-github-ui_2.html">See an example PR review</a></li>
        </ul>
        <p style="color: #888; font-size: 13px; margin: 0;">MIT-licensed · by Refactor Labs</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
