    <!-- Prefetch the example review so the CTA opens instantly (ignored where unsupported). -->

    <script>
      // Theme bootstrap — runs before paint, no FOUC on reload.
      // Honor a saved choice; otherwise fall back to the OS color scheme.
      (function () {
        try {
          var stored = localStorage.getItem('andy-theme');
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
