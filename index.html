    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Andy — PR Handoff Assistant",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "GitHub Actions",
        "description": "A GitHub Action that turns every pull request into a guided handoff: an architecture map, a money/time impact card, ranked code suggestions, and a risk quadrant.",
        "url": "https://refactorlab.github.io/andy/",
        "license": "https://github.com/refactorlab/andy/blob/main/LICENSE",
        "author": { "@type": "Organization", "name": "Refactor Labs", "url": "https://github.com/refactorlab" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Andy — PR Handoff Assistant by Refactor Labs</title>
    <!-- Prefetch the example review so the CTA opens instantly (ignored where unsupported). -->
    <script type="speculationrules">
      {
        "prefetch": [{ "source": "list", "urls": ["./pr36-github-ui_2.html"] }]
      }
    </script>
    <script>
      // Theme bootstrap — runs before paint, no FOUC on reload.
      // Honor a saved choice; otherwise fall back to the OS color scheme.
      (function () {
        try {
          var stored = localStorage.getItem('andy-theme');
          var theme =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = theme;
        } catch (_) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
