name: CI

# Validates that the landing page type-checks, tests, and builds on every PR,
# before changes reach main and trigger the Pages deploy (deploy.yml).
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Bundle-size budget
        # Fails if the gzipped initial JS / total CSS payload exceeds budget.
        # Logic + budgets live in scripts/bundle-budget.ts (measures CSS wherever
        # it ships, guards against a 0-byte false pass, and computes true initial
        # JS) so the gate is testable and can't silently undercount.
        run: bun scripts/bundle-budget.ts
